name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wokweb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wokweb/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (chrome)
        run: npm run build
        env:
          PLASMO_PUBLIC_API_URL: https://api.wokspec.org
          PLASMO_PUBLIC_SITE_URL: https://wokspec.org

      - name: Build (firefox)
        run: npm run build:firefox
        env:
          PLASMO_PUBLIC_API_URL: https://api.wokspec.org
          PLASMO_PUBLIC_SITE_URL: https://wokspec.org
